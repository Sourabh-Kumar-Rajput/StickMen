name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Headless tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No dependencies — the harnesses use only Node built-ins.
      - name: Entity-logic sim
        run: node test/sim.js
      - name: Full-game headless boot
        run: node test/headless.js
